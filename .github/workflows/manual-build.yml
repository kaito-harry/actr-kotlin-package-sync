name: Kotlin Manual Build

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref from the actr monorepo.
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate package-sync repository
        run: |
          test -f README.md
          test -f .github/workflows/manual-build.yml
      - name: Checkout source repository
        env:
          SOURCE_REPOSITORY: https://github.com/Actrium/actr
        run: |
          rm -rf source-checkout
          git clone --depth 1 --branch "${{ inputs.source_ref }}" "${SOURCE_REPOSITORY}" source-checkout
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source-checkout -> target
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Cache uniffi-bindgen binary
        uses: actions/cache@v4
        id: cache-uniffi
        with:
          path: ~/.cargo/bin/uniffi-bindgen
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen (if not cached)
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Verify uniffi-bindgen binary
        run: |
          if [ -f ~/.cargo/bin/uniffi-bindgen ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          which uniffi-bindgen
          uniffi-bindgen --version
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"
      - name: Build Android bindings
        working-directory: source-checkout/bindings/kotlin
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./build-android.sh
      - name: Assemble release artifact
        working-directory: source-checkout/bindings/kotlin
        run: ./gradlew :actr-kotlin:assembleRelease --no-daemon -PactrGroup=io.actrium -PactrVersion=0.0.0-dev

      - name: Package native binaries
        working-directory: source-checkout/bindings/kotlin
        run: bash scripts/package-binary.sh v${{ inputs.source_ref }}

      - name: Verify build artifacts
        working-directory: source-checkout/bindings/kotlin
        run: |
          set -euo pipefail
          echo "=== Native libraries ==="
          test -f target/aarch64-linux-android/release/libactr.so || { echo "Missing arm64 libactr.so"; exit 1; }
          test -f target/x86_64-linux-android/release/libactr.so || { echo "Missing x86_64 libactr.so"; exit 1; }

          echo "=== AAR ==="
          aar_count=$(find actr-kotlin/build/outputs/aar -name '*.aar' | wc -l)
          test "$aar_count" -ge 1 || { echo "Missing AAR"; exit 1; }
          find actr-kotlin/build/outputs/aar -name '*.aar' -exec ls -lh {} \;

          echo "=== Native ZIP ==="
          test -f dist/actr-kotlin-native.zip || { echo "Missing native ZIP"; exit 1; }
          unzip -l dist/actr-kotlin-native.zip

          echo "=== release.txt ==="
          test -f dist/release.txt || { echo "Missing release.txt"; exit 1; }
          cat dist/release.txt

          echo "=== All artifacts verified ==="

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-verification-artifacts-${{ inputs.source_ref }}
          path: |
            source-checkout/bindings/kotlin/dist/actr-kotlin-native.zip
            source-checkout/bindings/kotlin/dist/release.txt
            source-checkout/bindings/kotlin/actr-kotlin/build/outputs/aar/*.aar
          if-no-files-found: error
