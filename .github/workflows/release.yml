name: release-kotlin

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string
      source_sha:
        description: "Source commit SHA from the actr monorepo"
        required: true
        type: string
      source_tag:
        description: "Source tag from the actr monorepo (e.g. v0.2.0)"
        required: true
        type: string
      dry_run:
        description: "Build and package artifacts without publishing Maven, metadata, or GitHub Release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────
  # validate-source
  #   Clone actr once. Validate. Upload as artifact so
  #   downstream jobs never clone again.
  # ────────────────────────────────────────────────────────────
  validate-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package-sync repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Validate package-sync repository
        run: |
          test -f README.md
          test -f .github/workflows/release.yml

      - name: Checkout actr source
        env:
          SOURCE_REPOSITORY: https://github.com/Actrium/actr
        run: |
          rm -rf source-checkout
          git clone --depth 1 --branch "${{ inputs.source_tag }}" "${SOURCE_REPOSITORY}" source-checkout
          actual_sha=$(git -C source-checkout rev-parse HEAD)
          test "${actual_sha}" = "${{ inputs.source_sha }}"

      - name: Validate Android build script
        run: |
          bash -n source-checkout/bindings/kotlin/build-android.sh
          python3 - <<'PY'
          from pathlib import Path

          text = Path("source-checkout/bindings/kotlin/build-android.sh").read_text()
          required = [
              'ACTR_ANDROID_TARGETS="${ACTR_ANDROID_TARGETS:-aarch64-linux-android x86_64-linux-android}"',
              'target_rustflags="${!target_rustflags_var:?missing opus RUSTFLAGS for ${target}}"',
              'RUSTFLAGS="${target_rustflags}" cargo build -p libactr --release --target "${target}"',
          ]
          for snippet in required:
              if snippet not in text:
                  raise SystemExit(f"source Android build script missing {snippet}")
          if 'RUSTFLAGS_EXTRA="${RUSTFLAGS_EXTRA} -L ${opus_lib_dir} -l opus"' in text:
              raise SystemExit("source Android build script still accumulates global RUSTFLAGS")
          PY

      - name: Upload actr source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-checkout
          path: source-checkout
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # build-native (matrix)
  #   Cross-compile .so for each Android ABI.
  #   Downloads source artifact instead of re-cloning.
  #   Runs in parallel with generate-bindings.
  # ────────────────────────────────────────────────────────────
  build-native:
    needs: validate-source
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-linux-android
            abi: arm64-v8a
          - rust_target: x86_64-linux-android
            abi: x86_64
    steps:
      - name: Download actr source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-checkout
          path: source-checkout

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source-checkout -> target

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build ${{ matrix.abi }} native libraries
        working-directory: source-checkout/bindings/kotlin
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          ACTR_ANDROID_TARGETS: ${{ matrix.rust_target }}
          ACTR_BUILD_HOST_LIBRARY: "false"
          ACTR_GENERATE_KOTLIN_BINDINGS: "false"
          ACTR_COPY_DEMO_JNILIBS: "false"
        run: ./build-android.sh

      - name: Archive ${{ matrix.abi }} native libraries
        run: |
          mkdir -p native-artifacts
          tar -C source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs \
            -czf "native-artifacts/${{ matrix.abi }}.tar.gz" \
            "${{ matrix.abi }}"
          tar -tzf "native-artifacts/${{ matrix.abi }}.tar.gz"

      - name: Upload ${{ matrix.abi }} native artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-native-${{ matrix.abi }}
          path: native-artifacts/${{ matrix.abi }}.tar.gz
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # generate-bindings
  #   Compile host library + run uniffi-bindgen to produce
  #   Kotlin binding sources. Only needs host target (no NDK).
  #   Caches the uniffi-bindgen binary.
  #   Runs in parallel with build-native.
  # ────────────────────────────────────────────────────────────
  generate-bindings:
    needs: validate-source
    runs-on: ubuntu-latest
    steps:
      - name: Download actr source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-checkout
          path: source-checkout

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source-checkout -> target

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Cache uniffi-bindgen binary
        uses: actions/cache@v4
        id: cache-uniffi
        with:
          path: ~/.cargo/bin/uniffi-bindgen
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen (if not cached)
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Verify uniffi-bindgen binary
        run: |
          if [ -f ~/.cargo/bin/uniffi-bindgen ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          which uniffi-bindgen
          uniffi-bindgen --version

      - name: Generate Kotlin bindings
        working-directory: source-checkout/bindings/kotlin
        env:
          ACTR_BUILD_ANDROID_NATIVE: "false"
          ACTR_BUILD_HOST_LIBRARY: "true"
          ACTR_GENERATE_KOTLIN_BINDINGS: "true"
        run: ./build-android.sh

      - name: Verify bindings output
        run: |
          test -d source-checkout/bindings/kotlin/actr-kotlin/src/main/java/io/actrium/actr
          count=$(find source-checkout/bindings/kotlin/actr-kotlin/src/main/java/io/actrium/actr -name '*.kt' | wc -l)
          test "$count" -gt 0 || { echo "No .kt files found in bindings output"; exit 1; }
          echo "Found $count Kotlin binding files"

      - name: Upload Kotlin bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: source-checkout/bindings/kotlin/actr-kotlin/src/main/java/io/actrium/actr
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # publish
  #   Assembles everything: downloads source, native .so files,
  #   and generated bindings. Runs gradle assembleRelease + publish.
  #   NO clone, NO Rust, NO protoc, NO uniffi, NO NDK.
  #   Still needs Android SDK for gradle build-tools.
  # ────────────────────────────────────────────────────────────
  publish:
    needs:
      - validate-source
      - build-native
      - generate-bindings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package-sync repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Download actr source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-checkout
          path: source-checkout

      - name: Download Kotlin bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: source-checkout/bindings/kotlin/actr-kotlin/src/main/java/io/actrium/actr

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kotlin-native-*
          path: native-artifacts
          merge-multiple: true

      - name: Restore native libraries
        run: |
          mkdir -p source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs
          for archive in native-artifacts/*.tar.gz; do
            tar -C source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs -xzf "${archive}"
          done
          test -f source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs/arm64-v8a/libactr.so
          test -f source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs/arm64-v8a/libopus.so
          test -f source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs/x86_64/libactr.so
          test -f source-checkout/bindings/kotlin/actr-kotlin/src/main/jniLibs/x86_64/libopus.so

      - name: Package native binaries
        working-directory: source-checkout/bindings/kotlin
        run: bash scripts/package-binary.sh v${{ inputs.version }}

      - name: Upload packaged native artifact
        uses: actions/upload-artifact@v4
        with:
          name: actr-kotlin-native-${{ inputs.version }}
          path: |
            source-checkout/bindings/kotlin/dist/actr-kotlin-native.zip
            source-checkout/bindings/kotlin/dist/release.txt
          if-no-files-found: error

      - name: Publish Maven artifact
        if: ${{ inputs.dry_run == false }}
        working-directory: source-checkout/bindings/kotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./gradlew :actr-kotlin:assembleRelease :actr-kotlin:publish \
            --no-daemon \
            -PactrGroup=io.actrium \
            -PactrVersion=${{ inputs.version }} \
            -PactrPublishUrl=https://maven.pkg.github.com/${{ github.repository }}

      - name: Write release metadata
        run: |
          python3 - "${{ inputs.version }}" "${{ inputs.source_tag }}" "${{ inputs.source_sha }}" <<'PY'
          from __future__ import annotations

          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": sys.argv[1],
              "source_repository": "https://github.com/Actrium/actr",
              "source_tag": sys.argv[2],
              "source_sha": sys.argv[3],
              "coordinate": f"io.actrium:actr:{sys.argv[1]}",
              "android_abis": ["arm64-v8a", "x86_64"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          Path("release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Commit release metadata
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-metadata.json
          git commit -m "chore(release): publish v${{ inputs.version }}" || exit 0
          git push origin main

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          body_path: release-metadata.json
          files: source-checkout/bindings/kotlin/dist/actr-kotlin-native.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Release summary
        run: |
          {
            echo "## Release artifacts"
            echo ""
            echo "### Maven (GitHub Packages)"
            echo "- Group: \`io.actrium\`"
            echo "- Artifact: \`actr\`"
            echo "- Version: \`${{ inputs.version }}\`"
            echo ""
            echo "### Native libraries"
            cat source-checkout/bindings/kotlin/dist/release.txt
          } >> "$GITHUB_STEP_SUMMARY"